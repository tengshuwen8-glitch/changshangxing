// ==================== 市场 ====================
// 从 images.txt 读取图片列表，按命名规则自动解析
// 命名格式: 区服_段位_等级_天数_价格.jpg
function parseFilename(filename) {
  const name = filename.replace(/\.[^.]+$/, '');
  const parts = name.split('_');
  if (parts.length >= 5) {
    return {
      imageName: filename,
      server: parts[0],
      rank: parts[1],
      level: parts[2],
      rentalDays: parts[3],
      price: parts[4],
    };
  }
  return null;
}

async function renderMarket() {
  const container = $('market-list');
  try {
    const resp = await fetch('images.txt');
    if (!resp.ok) throw new Error('images.txt not found');
    const text = await resp.text();
    const filenames = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

    const items = filenames.map(parseFilename).filter(Boolean);

    if (items.length === 0) {
      container.innerHTML = `<div class="market-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        <p>暂无在售账号</p></div>`;
      return;
    }

    container.innerHTML = items.map((r, i) => {
      return `<div class="market-card">
        <div class="mc-img">
          <img src="images/${escHtml(r.imageName)}" alt="${escHtml(r.server||'')}" loading="lazy" onerror="this.style.opacity='0'">
        </div>
        <div class="mc-right">
          <div class="mc-name">${escHtml(r.server)}${r.rank ? ' · ' + escHtml(r.rank) : ''}</div>
          <div class="mc-info">
            ${r.level ? `<span>Lv.${escHtml(r.level)}</span>` : ''}
            ${r.rentalDays ? `<span>${escHtml(String(r.rentalDays))}天</span>` : ''}
          </div>
          ${r.price ? `<div class="mc-price">&yen;${escHtml(String(r.price))}</div>` : ''}
          <button class="btn-contact" onclick="switchTab('chat')">联系客服</button>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    container.innerHTML = `<div class="market-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      <p>暂无在售账号</p></div>`;
  }
}

// ==================== 客服聊天 ====================
async function renderChat() {
  const container = $('chat-messages');
  const msgs = await getMsgs();

  if (msgs.length === 0) {
    container.innerHTML = `<div class="chat-bubble cs">您好，欢迎联系刀锋商行客服。有什么可以帮您的？</div>`;
  } else {
    container.innerHTML = msgs.map(m => {
      const cls = m.sender === 'user' ? 'user' : 'cs';
      return `<div class="chat-bubble ${cls}">${escHtml(m.content)}</div>`;
    }).join('');
  }
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = $('chat-input');
  const content = input.value.trim();
  if (!content) return;

  try {
    await saveMsg({ content, sender: 'user' });
    input.value = '';
    await renderChat();
  } catch (err) {
    console.error('发送消息失败', err);
    return;
  }

  // 模拟客服回复
  setTimeout(() => {
    saveMsg({ content: '客服正在接线中，请稍候...', sender: 'cs' })
      .then(() => renderChat())
      .catch(err => console.error('客服回复失败', err));
  }, 1000);
}

$('btn-send').addEventListener('click', sendMessage);
$('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
// ==================== 用户系统 ====================
function initUser() {
  let user = localStorage.getItem('changshangxing_user');
  if (!user) {
    const uid = 'ZS' + String(Math.floor(100000 + Math.random() * 900000));
    user = JSON.stringify({ userId: uid, createdAt: new Date().toISOString() });
    localStorage.setItem('changshangxing_user', user);
  }
  const u = JSON.parse(user);
  $('user-id-display').textContent = u.userId;
  $('user-reg-time').textContent = formatTime(u.createdAt);

  // 统计挂单数 & 更新进度
  getListings().then(records => {
    $('user-listing-count').textContent = records.length;
    renderPaymentProgress(records);
    renderRentalProgress(records);
  });

  // 清理旧定时器，开启新定时器
  if (window._userTimer) clearInterval(window._userTimer);
  window._userTimer = setInterval(() => {
    getListings().then(records => {
      renderPaymentProgress(records);
      renderRentalProgress(records);
    });
  }, 1000);
}

function renderPaymentProgress(records) {
  const listings = records.filter(r => r.status === '挂单中');
  if (listings.length === 0) {
    $('payment-bar').style.transform = 'scaleX(0)';
    $('countdown-timer').style.display = 'none';
    $('countdown-sub').style.display = 'none';
    $('countdown-done').style.display = 'block';
    $('countdown-done').innerHTML = '暂无挂单，提交后可见打款进度';
    $('countdown-done').style.color = 'var(--text-secondary)';
    return;
  }

  // 取最新一条挂单的创建时间
  const latest = listings.reduce((a, b) => a.id > b.id ? a : b);
  const listTime = new Date(latest.createdAt).getTime();
  const payTime = listTime + 24 * 60 * 60 * 1000;
  const now = Date.now();
  const total = payTime - listTime;
  const elapsed = now - listTime;
  const pct = Math.min(Math.max(elapsed / total * 100, 0), 100);

  $('payment-bar').style.transform = 'scaleX(' + (pct / 100).toFixed(3) + ')';

  if (now >= payTime) {
    $('countdown-timer').style.display = 'none';
    $('countdown-sub').style.display = 'none';
    $('countdown-done').style.display = 'block';
    $('countdown-done').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"><polyline points="20 6 9 17 4 12"/></svg>已到账';
    $('countdown-done').style.color = 'var(--green)';
  } else {
    const remaining = payTime - now;
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    $('countdown-timer').style.display = 'block';
    $('countdown-timer').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    $('countdown-sub').style.display = 'block';
    const payDate = new Date(payTime);
    $('countdown-sub').textContent = `预计到账: ${payDate.getMonth()+1}月${payDate.getDate()}日 ${String(payDate.getHours()).padStart(2,'0')}:${String(payDate.getMinutes()).padStart(2,'0')}`;
    $('countdown-done').style.display = 'none';
  }
}

function renderRentalProgress(records) {
  const container = $('rental-list');
  const allWithRental = records.filter(r => r.rentalDays);

  if (allWithRental.length === 0) {
    container.innerHTML = '<div class="rental-empty">暂无出租中的账号</div>';
    return;
  }

  container.innerHTML = allWithRental.map(r => {
    const created = new Date(r.createdAt).getTime();
    const totalMs = r.rentalDays * 24 * 60 * 60 * 1000;
    const elapsed = Date.now() - created;
    const daysElapsed = Math.min(Math.floor(elapsed / (24 * 60 * 60 * 1000)), r.rentalDays);
    const currentDay = Math.min(daysElapsed + 1, r.rentalDays);

    let nodesHtml = '';
    for (let d = 1; d <= r.rentalDays; d++) {
      let cls = 'day-node';
      if (d < currentDay) cls += ' filled';
      else if (d === currentDay && r.status === '挂单中') cls += ' today';
      nodesHtml += `<div class="${cls}"></div>`;
    }

    return `<div class="rental-item">
      <div class="ri-header">
        <span class="ri-name">${escHtml(r.server)}${r.rank ? ' · ' + escHtml(r.rank) : ''}</span>
        <span class="ri-status-tag">${escHtml(r.status)}</span>
      </div>
      <div class="day-nodes">${nodesHtml}</div>
      <div class="ri-days-label">第 ${currentDay} 天 / 共 ${r.rentalDays} 天</div>
    </div>`;
  }).join('');
}

// 离开用户 Tab 时清除定时器（节省性能）
const userTabObserver = new MutationObserver(() => {
  if (!$('view-user').classList.contains('active') && window._userTimer) {
    clearInterval(window._userTimer);
    window._userTimer = null;
  }
});
userTabObserver.observe($('view-user'), { attributes: true, attributeFilter: ['class'] });

// ==================== Service Worker ====================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(() => {
      console.log('SW registered');
    }).catch(() => {
      console.log('SW skipped (likely HTTP)');
    });
  });
}
</script>
